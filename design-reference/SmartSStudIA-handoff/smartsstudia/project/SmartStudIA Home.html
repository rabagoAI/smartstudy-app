<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartStudIA — Educación potenciada por IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #09080f;
      color: #e8e4f3;
      overflow-x: hidden;
    }

    /* ── Hero gradient animation ── */
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-12px) rotate(1deg); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 40px oklch(0.55 0.28 290 / 0.4); }
      50%       { box-shadow: 0 0 80px oklch(0.55 0.28 290 / 0.7); }
    }
    @keyframes orb1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(60px,-40px) scale(1.15); }
      66%      { transform: translate(-40px, 30px) scale(0.9); }
    }
    @keyframes orb2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(-70px, 50px) scale(0.85); }
      66%      { transform: translate(50px,-30px) scale(1.2); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes tickerScroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(40px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0533, #0d1b6e, #4a0080, #0a2080, #6a00a8, #0d1b6e);
      background-size: 400% 400%;
      animation: gradShift 10s ease infinite;
    }
    .hero-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .hero-orb-1 {
      width: 500px; height: 500px;
      background: oklch(0.55 0.28 290 / 0.5);
      top: -100px; left: -100px;
      animation: orb1 12s ease-in-out infinite;
    }
    .hero-orb-2 {
      width: 600px; height: 600px;
      background: oklch(0.50 0.25 240 / 0.4);
      bottom: -150px; right: -150px;
      animation: orb2 15s ease-in-out infinite;
    }
    .hero-orb-3 {
      width: 300px; height: 300px;
      background: oklch(0.65 0.2 200 / 0.3);
      top: 40%; left: 60%;
      animation: orb1 9s ease-in-out infinite reverse;
    }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(9,8,15,0.6);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid oklch(1 0 0 / 0.08);
    }
    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 22px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .nav-links {
      display: flex; gap: 32px; list-style: none;
      font-size: 14px; font-weight: 500;
    }
    .nav-links a {
      color: oklch(1 0 0 / 0.7);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff; border: none; border-radius: 100px;
      padding: 10px 24px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s, transform 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-cta:hover { opacity: 0.85; transform: scale(1.04); }

    .hero-content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 0 24px;
      animation: fadeUp 1s ease both;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: oklch(1 0 0 / 0.1);
      border: 1px solid oklch(1 0 0 / 0.2);
      border-radius: 100px;
      padding: 6px 16px; font-size: 13px; font-weight: 500;
      margin-bottom: 28px;
      backdrop-filter: blur(8px);
    }
    .hero-badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
    }
    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(48px, 7vw, 88px);
      font-weight: 800; line-height: 1.04;
      letter-spacing: -2px;
      color: #fff;
      margin-bottom: 20px;
    }
    .hero-title span {
      background: linear-gradient(90deg, #c084fc, #818cf8, #38bdf8);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }
    .hero-sub {
      font-size: 18px; line-height: 1.7;
      color: oklch(1 0 0 / 0.7);
      max-width: 520px; margin-bottom: 40px;
    }
    .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff; border: none; border-radius: 100px;
      padding: 16px 36px; font-size: 16px; font-weight: 600;
      cursor: pointer; transition: all 0.25s;
      font-family: 'DM Sans', sans-serif;
      animation: pulseGlow 3s ease infinite;
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.03); }
    .btn-secondary {
      background: transparent;
      color: #fff; border: 1px solid oklch(1 0 0 / 0.3);
      border-radius: 100px;
      padding: 16px 36px; font-size: 16px; font-weight: 500;
      cursor: pointer; transition: all 0.25s;
      font-family: 'DM Sans', sans-serif;
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover { background: oklch(1 0 0 / 0.1); border-color: oklch(1 0 0 / 0.5); }

    .hero-mockup {
      position: relative; z-index: 2;
      margin-top: 60px;
      animation: float 6s ease-in-out infinite;
    }
    .hero-mockup-frame {
      width: min(640px, 90vw);
      background: rgba(15,12,30,0.85);
      border: 1px solid oklch(1 0 0 / 0.15);
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px oklch(0 0 0 / 0.6), 0 0 0 1px oklch(1 0 0 / 0.05);
    }
    .mockup-topbar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
    .mockup-url {
      flex: 1; background: oklch(1 0 0 / 0.07); border-radius: 6px;
      padding: 5px 12px; font-size: 12px; color: oklch(1 0 0 / 0.4);
      font-family: monospace;
    }
    .mockup-screen {
      background: linear-gradient(135deg, #0f0c1e, #0d1b6e20);
      border-radius: 12px; padding: 20px; min-height: 200px;
      border: 1px solid oklch(1 0 0 / 0.08);
      display: flex; flex-direction: column; gap: 12px;
    }

    /* ── Ticker ── */
    .ticker {
      background: linear-gradient(135deg, #4c1d95, #1d4ed8);
      padding: 14px 0; overflow: hidden;
    }
    .ticker-inner {
      display: flex; width: max-content;
      animation: tickerScroll 25s linear infinite;
    }
    .ticker-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0 32px; font-size: 14px; font-weight: 500;
      color: oklch(1 0 0 / 0.85); white-space: nowrap;
    }
    .ticker-sep { color: oklch(1 0 0 / 0.3); font-size: 20px; }

    /* ── Sections ── */
    .section { padding: 100px 48px; }
    .section-light { background: #f4f1ff; color: #1a0f3c; }
    .section-dark  { background: #09080f; color: #e8e4f3; }
    .section-mid   { background: #0d0b1a; color: #e8e4f3; }

    .section-header { text-align: center; margin-bottom: 64px; }
    .section-eyebrow {
      display: inline-block;
      font-size: 12px; font-weight: 700; letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(32px, 4vw, 52px);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -1.5px;
    }
    .section-light .section-title { color: #1a0f3c; }
    .section-dark .section-title, .section-mid .section-title { color: #fff; }
    .section-sub {
      font-size: 17px; margin-top: 12px; line-height: 1.7;
      max-width: 540px; margin-left: auto; margin-right: auto;
    }
    .section-light .section-sub { color: #6b5f91; }
    .section-dark .section-sub, .section-mid .section-sub { color: oklch(1 0 0 / 0.55); }

    /* ── Subject Cards ── */
    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1200px; margin: 0 auto;
    }
    .subject-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative; overflow: hidden;
      border: 1px solid oklch(0.7 0.05 280 / 0.15);
      box-shadow: 0 4px 24px oklch(0 0 0 / 0.06);
    }
    .subject-card::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.35s;
      border-radius: 24px;
    }
    .subject-card:hover {
      transform: translateY(-8px) scale(1.02);
    }
    .subject-card:hover::before { opacity: 1; }
    .subject-card:hover .subject-icon-wrap {
      transform: scale(1.1) rotate(-5deg);
    }

    .subject-icon-wrap {
      width: 72px; height: 72px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin-bottom: 20px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .subject-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px; font-weight: 700; color: #1a0f3c;
      margin-bottom: 8px;
    }
    .subject-desc { font-size: 14px; color: #6b5f91; line-height: 1.6; }
    .subject-tag {
      display: inline-block; margin-top: 16px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
    }
    .subject-arrow {
      position: absolute; right: 24px; bottom: 24px;
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      opacity: 0; transform: translateX(-8px);
      transition: all 0.3s;
    }
    .subject-card:hover .subject-arrow {
      opacity: 1; transform: translateX(0);
    }

    /* ── AI Section ── */
    .ai-section {
      background: linear-gradient(160deg, #0a0618 0%, #0d1b6e15 40%, #0a0618 100%);
      position: relative; overflow: hidden;
    }
    .ai-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 50%, oklch(0.45 0.28 280 / 0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .ai-grid {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .ai-left { position: relative; z-index: 2; }
    .ai-feature-list { display: flex; flex-direction: column; gap: 24px; margin-top: 40px; }
    .ai-feature {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 20px; border-radius: 16px;
      background: oklch(1 0 0 / 0.04);
      border: 1px solid oklch(1 0 0 / 0.08);
      cursor: pointer; transition: all 0.25s;
    }
    .ai-feature:hover, .ai-feature.active {
      background: oklch(0.55 0.28 280 / 0.12);
      border-color: oklch(0.55 0.28 280 / 0.4);
    }
    .ai-feature-icon {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .ai-feature-text h4 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 700; color: #fff;
      margin-bottom: 4px;
    }
    .ai-feature-text p { font-size: 14px; color: oklch(1 0 0 / 0.55); line-height: 1.6; }

    /* Product mockup */
    .ai-right { position: relative; z-index: 2; }
    .product-mockup {
      background: oklch(0.12 0.04 270);
      border-radius: 24px;
      border: 1px solid oklch(1 0 0 / 0.12);
      overflow: hidden;
      box-shadow: 0 40px 100px oklch(0 0 0 / 0.8), 0 0 60px oklch(0.5 0.28 280 / 0.2);
    }
    .mockup-header {
      background: oklch(0.1 0.04 270);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid oklch(1 0 0 / 0.08);
    }
    .mockup-header-dots { display: flex; gap: 6px; }
    .mockup-header-dot { width: 10px; height: 10px; border-radius: 50%; }
    .mockup-header-title {
      font-size: 13px; color: oklch(1 0 0 / 0.5); font-family: monospace;
    }
    .mockup-body {
      display: flex; height: 360px;
    }
    .mockup-sidebar {
      width: 64px; background: oklch(0.09 0.04 270);
      border-right: 1px solid oklch(1 0 0 / 0.08);
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 16px 0;
    }
    .mockup-sidebar-item {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer;
      transition: background 0.2s;
    }
    .mockup-sidebar-item.active { background: oklch(0.55 0.28 280 / 0.3); }
    .mockup-main {
      flex: 1; padding: 20px; overflow: hidden;
      display: flex; flex-direction: column; gap: 12px;
    }
    .mockup-chat-row {
      display: flex; gap: 10px; align-items: flex-start;
    }
    .mockup-avatar {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
    }
    .mockup-bubble {
      padding: 10px 14px; border-radius: 12px;
      font-size: 12px; line-height: 1.5; max-width: 240px;
    }
    .mockup-bubble.user {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff; border-radius: 12px 12px 4px 12px;
      margin-left: auto;
    }
    .mockup-bubble.ai {
      background: oklch(1 0 0 / 0.08);
      color: oklch(1 0 0 / 0.8); border-radius: 12px 12px 12px 4px;
    }
    .mockup-typing {
      display: flex; gap: 4px; align-items: center; padding: 10px 14px;
      background: oklch(1 0 0 / 0.05); border-radius: 12px; width: fit-content;
    }
    .mockup-dot-anim {
      width: 6px; height: 6px; border-radius: 50%;
      background: oklch(1 0 0 / 0.4);
      animation: typingDot 1.4s ease-in-out infinite;
    }
    .mockup-dot-anim:nth-child(2) { animation-delay: 0.2s; }
    .mockup-dot-anim:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot {
      0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
      40% { transform: scale(1.4); opacity: 1; }
    }
    .mockup-input-bar {
      padding: 12px 16px;
      background: oklch(0.09 0.04 270);
      border-top: 1px solid oklch(1 0 0 / 0.08);
      display: flex; gap: 10px; align-items: center;
    }
    .mockup-input {
      flex: 1; background: oklch(1 0 0 / 0.07); border: 1px solid oklch(1 0 0 / 0.1);
      border-radius: 8px; padding: 8px 12px; font-size: 12px;
      color: oklch(1 0 0 / 0.5);
    }
    .mockup-send {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .stats-row {
      display: flex; gap: 16px; margin-top: 40px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: oklch(1 0 0 / 0.06);
      border: 1px solid oklch(1 0 0 / 0.1);
      border-radius: 16px; padding: 16px 24px;
      text-align: center; flex: 1; min-width: 100px;
    }
    .stat-chip-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-chip-label { font-size: 12px; color: oklch(1 0 0 / 0.5); margin-top: 4px; }

    /* ── Testimonials ── */
    .testimonials-section { background: #f4f1ff; }
    .testimonials-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px; max-width: 1100px; margin: 0 auto;
    }
    .testi-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 40px oklch(0.3 0.15 280 / 0.1);
      border: 1px solid oklch(0.7 0.05 280 / 0.15);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }
    .testi-card:nth-child(2) { transform: translateY(-16px); }
    .testi-card:nth-child(2):hover { transform: translateY(-24px); }
    .testi-card:hover {
      box-shadow: 0 16px 64px oklch(0.3 0.15 280 / 0.18);
      transform: translateY(-8px);
    }
    .testi-card:nth-child(2):hover { transform: translateY(-24px); }
    .testi-quote-icon {
      font-size: 40px; line-height: 1;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 16px; display: block;
    }
    .testi-stars { display: flex; gap: 3px; margin-bottom: 16px; }
    .testi-star { color: #f59e0b; font-size: 16px; }
    .testi-text {
      font-size: 15px; line-height: 1.75; color: #3d3060;
      margin-bottom: 24px;
    }
    .testi-author { display: flex; align-items: center; gap: 12px; }
    .testi-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .testi-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 15px; color: #1a0f3c;
    }
    .testi-grade { font-size: 13px; color: #9084c0; }
    .testi-badge {
      position: absolute; top: 20px; right: 20px;
      background: linear-gradient(135deg, #7c3aed15, #2563eb15);
      border: 1px solid oklch(0.55 0.28 280 / 0.2);
      border-radius: 8px; padding: 4px 10px;
      font-size: 11px; font-weight: 600; color: #6d28d9;
    }

    /* ── CTA Banner ── */
    .cta-section {
      padding: 100px 48px;
      background: linear-gradient(135deg, #1a0533, #0d1b6e, #4a0080);
      background-size: 300% 300%;
      animation: gradShift 8s ease infinite;
      text-align: center; position: relative; overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 80% at 50% 120%, oklch(0.55 0.28 290 / 0.3) 0%, transparent 60%);
    }
    .cta-section > * { position: relative; z-index: 1; }
    .cta-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 800; color: #fff; line-height: 1.1;

          <div className="tweak-options">
            {["rounded","sharp"].map(v=>(
              <button key={v} className={`tweak-opt ${tweaks.cardStyle===v?"active":""}`} onClick={()=>setTweak("cardStyle",v)}>
                {v==="rounded" ? "Redondeado" : "Cuadrado"}
              </button>
            ))}
          </div>
        </div>
        <div className="tweak-row">
          <div className="tweak-label">Testimonios</div>
          <div className="tweak-options">
            {["staggered","flat"].map(v=>(
              <button key={v} className={`tweak-opt ${tweaks.testimonialLayout===v?"active":""}`} onClick={()=>setTweak("testimonialLayout",v)}>
                {v==="staggered" ? "Escalonado" : "Plano"}
              </button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
